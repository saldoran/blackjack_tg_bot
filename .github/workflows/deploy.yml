name: Deploy Blackjack Bot

on:
  push:
    branches: [main]
  workflow_dispatch: # Позволяет запускать деплой вручную

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Send deployment start notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_ADMIN_ID }} \
            -d text="♣️ Начат деплой Blackjack бота... (commit: ${{ github.sha }})" \
            -d parse_mode="HTML"

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@185.233.45.95 << 'EOF'
            set -e
            echo "🚀 Начинаем деплой..."
            
            # Создаем структуру директорий если её нет
            mkdir -p /home/bots
            
            # Переходим в директорию ботов
            cd /home/bots
            
            # Если репозиторий не существует, клонируем его
            if [ ! -d "blackjack_bot/.git" ]; then
              echo "📥 Клонируем репозиторий..."
              rm -rf blackjack_bot
              git clone https://github.com/saldoran/blackjack_tg_bot.git blackjack_bot
            fi
            
            # Переходим в директорию бота
            cd blackjack_bot
            
            # Сохраняем текущий коммит для отката
            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "Текущий коммит: $CURRENT_COMMIT"
            
            # Обновляем код
            echo "📥 Получаем обновления..."
            git fetch origin
            git reset --hard origin/main
            
            # Создаем виртуальное окружение если его нет
            if [ ! -d "../../venv" ]; then
              echo "🐍 Создаем виртуальное окружение..."
              cd /home
              python3 -m venv venv
              source venv/bin/activate
              pip install --upgrade pip
              cd bots/blackjack_bot
            else
              # Активируем виртуальное окружение
              echo "🐍 Активируем виртуальное окружение..."
              source ../../venv/bin/activate
            fi
            
            # Обновляем зависимости
            echo "📦 Обновляем зависимости..."
            pip install -r requirements.txt --quiet
            
            # Проверяем синтаксис Python файлов
            echo "🔍 Проверяем синтаксис..."
            python -m py_compile main.py game.py economy.py storage.py settings.py
            
            # Делаем скрипты исполняемыми
            echo "🔧 Настраиваем скрипты..."
            chmod +x *.sh
            
            # Создаем .env файл если его нет
            if [ ! -f ".env" ]; then
              echo "📝 Создаем .env файл..."
              echo "TG_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            fi
            
            # Перезапускаем бота
            echo "🔄 Перезапускаем бота..."
            ./stop_bot.sh
            sleep 2
            nohup ./run_bot.sh > /dev/null 2>&1 &
            
            echo "✅ Blackjack бот успешно обновлён и перезапущен!"
          EOF

      - name: Send deployment success notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_ADMIN_ID }} \
            -d text="✅ <b>Blackjack бот успешно обновлён!</b>%0A%0A📝 <b>Коммит:</b> <code>${{ github.sha }}</code>%0A👤 <b>Автор:</b> ${{ github.actor }}%0A⏰ <b>Время:</b> $(date '+%d.%m.%Y %H:%M:%S')" \
            -d parse_mode="HTML"

      - name: Send deployment failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_ADMIN_ID }} \
            -d text="❌ <b>Ошибка при деплое Blackjack бота!</b>%0A%0A📝 <b>Коммит:</b> <code>${{ github.sha }}</code>%0A👤 <b>Автор:</b> ${{ github.actor }}%0A⏰ <b>Время:</b> $(date '+%d.%m.%Y %H:%M:%S')%0A%0A🔍 Проверьте логи GitHub Actions для деталей." \
            -d parse_mode="HTML"
